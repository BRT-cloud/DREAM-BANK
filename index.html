  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      background-color: #f6f5f2; /* cozy warm cream bg */
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .app-container {
      width: 95vw;
      max-width: 1280px;
      min-height: 100vh;
      background: #ffffff;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    @media (min-width: 640px) {
      .app-container {
        min-height: 800px;
        height: 90vh;
        max-height: 950px;
        border-radius: 45px;
        margin: 20px 0;
      }
    }

    /* Animations */
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .animate-slide-up {
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    @keyframes floating {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }
    .animate-float {
      animation: floating 3.5s ease-in-out infinite;
    }

    /* UI elements */
    .btn, .btn-bouncy {
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }
    .btn:active, .btn-bouncy:active {
      transform: scale(0.94) translateY(3px);
    }
    
    .btn {
      box-shadow: 0 6px 0 rgba(0,0,0,0.06), 0 10px 20px rgba(0,0,0,0.05);
    }
    .btn:active {
      box-shadow: 0 2px 0 rgba(0,0,0,0.06), 0 4px 10px rgba(0,0,0,0.05);
    }
    
    /* 이모지 상단 잘림 방지 */
    .emoji-fix {
      display: inline-block;
      line-height: 1.2;
      padding-top: 0.15em;
      padding-bottom: 0.1em;
    }
    
    /* Hide scrollbar for a cleaner look */
    ::-webkit-scrollbar { display: none; }
  </style>

    function App() {
      // States
      const [view, setView] = React.useState('login'); // login, dashboard, transaction, admin, avatar-studio
      const [users, setUsers] = React.useState([]);
      const [currentUser, setCurrentUser] = React.useState(null);
      const [transactionType, setTransactionType] = React.useState(''); // 'save' or 'use'
      const [loading, setLoading] = React.useState(false);
      
      // inputs
      const [nickname, setNickname] = React.useState('');
      const [pin, setPin] = React.useState('');
      
      const [txAmount, setTxAmount] = React.useState('');
      const [txCategory, setTxCategory] = React.useState('');
      const [alertMsg, setAlertMsg] = React.useState('');

      // 아바타 스튜디오 전용 상태 (React Hook Rule 위반 방지)
      const [avatarTemp, setAvatarTemp] = React.useState({});
      const [avatarTab, setAvatarTab] = React.useState('skin');

      // Fetch users from GAS on mount
      React.useEffect(() => {
        fetchUsers();
        
        // 전역 효과음(버튼 클릭 시 숲속의 물방울, 혹은 '뽀용' 소리)
        const handleDocClick = (e) => {
          if (e.target.closest('button') || e.target.closest('.btn-bouncy')) {
             try {
                // 부드러운 팝 사운드 (Free License)
                const a = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
                a.volume = 0.3;
                a.play().catch(() => {});
             } catch(err) {}
          }
        };
        document.addEventListener('click', handleDocClick);
        return () => document.removeEventListener('click', handleDocClick);
      }, []);

      const fetchUsers = async () => {
        setLoading(true);
        try {
          const res = await fetch(SCRIPT_URL + "?action=read");
          const data = await res.json();
          if (Array.isArray(data)) {
            // Parse Avatar JSON from GAS or Fallback to LocalStorage
            const parsedData = data.map(u => {
              let av = { bg: 'none', skin: '#fce2c4', hairColor: '#7a5c43', clothesBase: '#f4a261', hairBack: 'none', eyes: 'normal', nose: 'tiny', mouth: 'smile', blush: 'none', bottoms: 'pants', tops: 'tshirt', hairFront: 'bangs', hat: 'none', handItem: 'none' };
              let unl = ['bg_none', 'bg_room', 'hairBack_none', 'hairBack_long', 'eyes_normal', 'eyes_happy', 'nose_tiny', 'nose_round', 'mouth_smile', 'blush_none', 'bottoms_pants', 'tops_tshirt', 'hairFront_bangs', 'hairFront_center', 'hat_none', 'handItem_none'];
              
              // 1. LocalStorage Fallback Check
              try {
                const local = localStorage.getItem(`avatar_${u.name}`);
                if(local) {
                  const p = JSON.parse(local);
                  if(p.config) av = {...av, ...p.config};
                  if(p.unlocked) unl = [...new Set([...unl, ...p.unlocked])];
                }
              } catch(e) {}
              
              // 2. GAS Sheet Check (If teacher modified the backend to return avatarData)
              if(u.avatarData) {
                try {
                  const p = JSON.parse(u.avatarData);
                  if(p.config) av = {...av, ...p.config};
                  if(p.unlocked) unl = [...new Set([...unl, ...p.unlocked])];
                } catch(e) {}
              }

              return { ...u, avatar: av, unlocked: unl };
            });

            setUsers(parsedData);
            
            if (currentUser) {
              const updated = parsedData.find(u => u.name === currentUser.name);
              if (updated) setCurrentUser(updated);
            }
          }
        } catch (err) {
          console.error("Failed to fetch", err);
          if(users.length === 0) setUsers([{ name: '튤립', balance: 5000, avatar:{hair:'short'}, unlocked:[] }]);
        }
        setLoading(false);
      };

      // Avatar Sync (Saves to LocalStorage & sends to GAS sheet if possible)
      const handleAvatarUpdate = async (newConfig, newUnlocked, cost, logCategory) => {
        const newBalance = currentUser.balance - cost;
        const updatedUser = {
           ...currentUser,
           balance: newBalance,
           avatar: newConfig,
           unlocked: newUnlocked
        };
        setCurrentUser(updatedUser);
        setView('dashboard'); // return to dashboard
        
        const avatarDataStr = JSON.stringify({ config: newConfig, unlocked: newUnlocked });
        
        // Save LocalStorage
        try { localStorage.setItem(`avatar_${currentUser.name}`, avatarDataStr); } catch(e) {}
        
        // Save to GAS
        const payload = {
          name: currentUser.name,
          amount: cost,
          balance: newBalance,
          type: '사용',
          category: logCategory,
          avatarData: avatarDataStr
        };
        try {
          await fetch(SCRIPT_URL, {
            method: 'POST', mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
          setTimeout(fetchUsers, 1500);
        } catch(e) {}
      };

      const handleLogin = (e) => {
        e.preventDefault();
        
        if (nickname === '관리자' && pin === '1234') {
          setView('admin');
          return;
        }

        const found = users.find(u => u.name === nickname);
        if (found) {
          setCurrentUser(found);
          setView('dashboard');
        } else {
          setAlertMsg('닉네임을 찾을 수 없어요 😢');
          setTimeout(() => setAlertMsg(''), 3000);
        }
      };

      const handleTransactionSubmit = async () => {
        if (!txAmount || isNaN(txAmount)) return;
        const amountNum = parseInt(txAmount, 10);
        if (amountNum <= 0) return;

        if (transactionType === 'use' && amountNum > currentUser.balance) {
          setAlertMsg('앗! 잔액이 부족해요 😢');
          setTimeout(() => setAlertMsg(''), 3000);
          return;
        }

        // Apply immediately locally 
        const newBalance = transactionType === 'save' 
          ? currentUser.balance + amountNum 
          : currentUser.balance - amountNum;
          
        const updatedUser = {...currentUser, balance: newBalance};
        setCurrentUser(updatedUser);
        
        // Optimistic UI back to dashboard immediately as requested
        setView('dashboard');
        
        // POST to GAS
        const payload = {
          name: currentUser.name,
          amount: amountNum,
          balance: newBalance,
          type: transactionType === 'save' ? '저축' : '사용',
          category: txCategory || '기타',
        };

        try {
          // Standard POST request, using no-cors
          await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
          // Background refresh
          setTimeout(fetchUsers, 1500);
        } catch (error) {
          console.error('Transaction error', error);
        }
        
        // reset fields
        setTxAmount('');
        setTxCategory('');
      };

      const openTransaction = (type) => {
        setTransactionType(type);
        setTxAmount('');
        setTxCategory('');
        setView('transaction');
      };

      const formatMoney = (amount) => {
        return new Intl.NumberFormat('ko-KR').format(amount) + '원';
      };

          {view === 'admin' && renderAdmin()}
          {view === 'avatar-studio' && renderAvatarStudio()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
