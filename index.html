<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>꿈키움 은행</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons (Not strictly needed if inline SVGs, but kept for future) -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      background-color: #f6f5f2; /* cozy warm cream bg */
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .app-container {
      width: 100%;
      max-width: 640px;
      min-height: 100vh;
      background: #ffffff;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    @media (min-width: 640px) {
      .app-container {
        min-height: 800px;
        height: 90vh;
        max-height: 950px;
        border-radius: 45px;
        margin: 20px 0;
      }
    }

    /* Animations */
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .animate-slide-up {
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    @keyframes floating {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }
    .animate-float {
      animation: floating 3.5s ease-in-out infinite;
    }

    /* UI elements */
    .btn, .btn-bouncy {
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }
    .btn:active, .btn-bouncy:active {
      transform: scale(0.94) translateY(3px);
    }
    
    .btn {
      box-shadow: 0 6px 0 rgba(0,0,0,0.06), 0 10px 20px rgba(0,0,0,0.05);
    }
    .btn:active {
      box-shadow: 0 2px 0 rgba(0,0,0,0.06), 0 4px 10px rgba(0,0,0,0.05);
    }
    
    /* 이모지 상단 잘림 방지 */
    .emoji-fix {
      display: inline-block;
      line-height: 1.2;
      padding-top: 0.15em;
      padding-bottom: 0.1em;
    }
    
    /* Hide scrollbar for a cleaner look */
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby1tWHMqOG9Ba-THZ9yW3t02Zm1xY54cPLTVk5xjW6X1k_vzmTXK08r6w12nw6iaJ8/exec";

    // --- Coazy 아바타 엔진 & 데이터 (Animal Crossing Style) ---
    const AVATAR_CATALOG = {
      bg: [
        { id: 'none', name: '없음', price: 0 },
        { id: 'room', name: '아늑한 방', price: 1000 },
        { id: 'forest', name: '햇살 숲', price: 2000 }
      ],
      hairBack: [
        { id: 'none', name: '없음', price: 0 },
        { id: 'long', name: '가벼운 긴머리', price: 0 },
        { id: 'ponytail', name: '포니테일', price: 2000 }
      ],
      eyes: [
        { id: 'normal', name: '동그란 눈', price: 0 },
        { id: 'happy', name: '웃는 눈', price: 0 },
        { id: 'star', name: '초롱초롱', price: 5000 }
      ],
      nose: [
        { id: 'tiny', name: '작은 코', price: 0 },
        { id: 'round', name: '동그란 코', price: 0 }
      ],
      mouth: [
        { id: 'smile', name: '미소', price: 0 },
        { id: 'cat', name: '고양이 입', price: 2000 }
      ],
      blush: [
        { id: 'none', name: '안함', price: 0 },
        { id: 'round', name: '발그레', price: 1000 }
      ],
      bottoms: [
        { id: 'pants', name: '반바지', price: 0 },
        { id: 'skirt', name: '치마', price: 1000 }
      ],
      tops: [
        { id: 'tshirt', name: '티셔츠', price: 0 },
        { id: 'sweater', name: '스웨터', price: 2000 }
      ],
      hairFront: [
        { id: 'bangs', name: '단정 앞머리', price: 0 },
        { id: 'center', name: '가르마', price: 0 }
      ],
      hat: [
        { id: 'none', name: '안함', price: 0 },
        { id: 'ribbon', name: '리본', price: 3000 },
        { id: 'straw', name: '밀짚모자', price: 5000 }
      ],
      handItem: [
        { id: 'none', name: '안함', price: 0 },
        { id: 'net', name: '잠자리채', price: 4000 },
        { id: 'book', name: '책', price: 3000 }
      ]
    };

    const AVATAR_COLORS = {
      skin: ['#fff5e1', '#fce2c4', '#f5c6a5', '#e2a378', '#ac7553', '#714c33'],
      hairColor: ['#4a3f35', '#7a5c43', '#af8260', '#f1c27d', '#3e5c47', '#5b6b80', '#c98a96', '#d6b3a3'],
      clothesBase: ['#f4a261', '#e76f51', '#2a9d8f', '#e9c46a', '#264653', '#8ab17d', '#d4a373', '#e07a5f', '#a8dadc', '#457b9d']
    };

    const Avatar = ({ config, className = '' }) => {
      const c = { 
        bg: 'none', skin: '#fce2c4', hairColor: '#7a5c43', clothesBase: '#f4a261', 
        hairBack: 'none', eyes: 'normal', nose: 'tiny', mouth: 'smile', blush: 'none', 
        bottoms: 'pants', tops: 'tshirt', hairFront: 'bangs', hat: 'none', handItem: 'none', 
        ...config 
      };

      const renderBg = () => {
         if(c.bg === 'room') return <rect width="100" height="120" fill="#fef3c7" rx="10" />;
         if(c.bg === 'forest') return (
            <g>
               <rect width="100" height="120" fill="#dcfce7" rx="10" />
               <circle cx="20" cy="110" r="30" fill="#bbf7d0" />
               <circle cx="80" cy="100" r="40" fill="#86efac" />
            </g>
         );
         return null;
      };

      const renderHairBack = () => {
         if(c.hairBack === 'long') return <path d="M16,45 C16,90 28,110 35,105 C25,90 22,50 50,50 C78,50 75,90 65,105 C72,110 84,90 84,45 Z" fill={c.hairColor} />;
         if(c.hairBack === 'ponytail') return <path d="M80,35 Q95,45 80,65 Q70,55 75,35 Z" fill={c.hairColor} />;
         return null;
      };

      const renderEyes = () => {
         if(c.eyes === 'happy') return <path d="M33,48 Q38,42 43,48 M57,48 Q62,42 67,48" stroke="#4a3f35" strokeWidth="3" fill="none" strokeLinecap="round" />;
         if(c.eyes === 'star') return (
            <g fill="#fbbf24">
               <polygon points="38,43 40,48 45,50 40,52 38,57 36,52 31,50 36,48" />
               <polygon points="62,43 64,48 69,50 64,52 62,57 60,52 55,50 60,48" />
            </g>
         );
         return (
            <g>
               <circle cx="38" cy="48" r="3.5" fill="#4a3f35" />
               <circle cx="62" cy="48" r="3.5" fill="#4a3f35" />
            </g>
         );
      };

      const renderNose = () => {
         if(c.nose === 'tiny') return <polygon points="49,53 51,53 50,55" fill="#d97706" opacity="0.6" />;
         if(c.nose === 'round') return <circle cx="50" cy="54" r="2" fill="#d97706" opacity="0.6" />;
         return null;
      };

      const renderMouth = () => {
         if(c.mouth === 'cat') return <path d="M44,59 Q47,63 50,59 Q53,63 56,59" stroke="#4a3f35" strokeWidth="2.5" fill="none" strokeLinecap="round" />;
         return <path d="M44,59 Q50,64 56,59" stroke="#4a3f35" strokeWidth="2.5" fill="none" strokeLinecap="round" />;
      };

      const renderBlush = () => {
         if(c.blush === 'round') return (
            <g fill="#fecaca" opacity="0.8">
               <ellipse cx="28" cy="54" rx="6" ry="4" />
               <ellipse cx="72" cy="54" rx="6" ry="4" />
            </g>
         );
         return null;
      };

      const renderBottoms = () => {
         if(c.bottoms === 'skirt') return <path d="M32,100 L24,115 L76,115 L68,100 Z" fill="#264653" />;
         return <path d="M30,100 L30,118 L46,118 L46,105 L54,105 L54,118 L70,118 L70,100 Z" fill="#2a9d8f" />;
      };

      const renderTops = () => {
         const color = c.clothesBase;
         if(c.tops === 'sweater') return (
            <g fill={color}>
               <path d="M45,80 Q50,83 55,80 L75,105 L25,105 Z" />
               <path d="M30,85 L15,105 L25,110 L38,95 Z M70,85 L85,105 L75,110 L62,95 Z" />
            </g>
         );
         return (
            <g fill={color}>
               <path d="M50,80 Q65,80 70,103 L30,103 Q35,80 50,80 Z" />
               <path d="M32,85 L18,98 L24,104 L37,92 Z M68,85 L82,98 L76,104 L63,92 Z" />
            </g>
         );
      };

      const renderHairFront = () => {
         if(c.hairFront === 'bangs') return <path d="M14,45 C14,-2 86,-2 86,45 C78,20 60,18 14,45 Z" fill={c.hairColor} />;
         if(c.hairFront === 'center') return <path d="M14,45 C14,-2 50,-2 50,25 C50,-2 86,-2 86,45 C78,15 60,15 50,25 C40,15 22,15 14,45 Z" fill={c.hairColor} />;
         return null;
      };

      const renderHat = () => {
         if(c.hat === 'ribbon') return (
            <g fill="#ef4444">
               <circle cx="50" cy="15" r="4" />
               <path d="M50,15 L35,5 L35,25 Z M50,15 L65,5 L65,25 Z" />
            </g>
         );
         if(c.hat === 'straw') return (
            <g fill="#fde047">
               <ellipse cx="50" cy="20" rx="35" ry="12" />
               <path d="M30,18 C30,0 70,0 70,18 Z" fill="#facc15" />
               <rect x="30.5" y="14" width="39" height="4" fill="#ef4444" />
            </g>
         );
         return null;
      };

      const renderHandItem = () => {
         if(c.handItem === 'net') return (
            <g strokeLinecap="round" strokeLinejoin="round">
               <line x1="18" y1="102" x2="8" y2="60" stroke="#78350f" strokeWidth="3" />
               <circle cx="6" cy="50" r="10" stroke="#f87171" strokeWidth="2" fill="none" />
               <path d="M-4,50 Q6,70 16,50" fill="none" stroke="#e2e8f0" strokeWidth="1" />
            </g>
         );
         if(c.handItem === 'book') return (
            <g>
               <rect x="10" y="85" width="16" height="20" fill="#3b82f6" rx="2" transform="rotate(-15 10 85)" />
               <rect x="12" y="86" width="12" height="18" fill="#fff" rx="1" transform="rotate(-15 10 85)" />
            </g>
         );
         return null;
      };

      return (
        <svg viewBox="0 0 100 120" className={className}>
          {renderBg()}
          {renderHairBack()}
          {/* Base Body */}
          <g>
             <circle cx="50" cy="46" r="36" fill={c.skin} />
             <path d="M50,80 Q65,80 75,115 L25,115 Q35,80 50,80 Z" fill={c.skin} />
             {/* Hands Base (Under tops sleeves but over bottoms!) */}
             <circle cx="16" cy="100" r="6" fill={c.skin} />
             <circle cx="84" cy="100" r="6" fill={c.skin} />
          </g>
          {renderBottoms()}
          {renderTops()}
          {/* Face Features */}
          {renderEyes()}
          {renderNose()}
          {renderMouth()}
          {renderBlush()}
          {/* Top Overlays */}
          {renderHairFront()}
          {renderHat()}
          {renderHandItem()}
        </svg>
      );
    };

    function App() {
      // States
      const [view, setView] = React.useState('login'); // login, dashboard, transaction, admin, avatar-studio
      const [users, setUsers] = React.useState([]);
      const [currentUser, setCurrentUser] = React.useState(null);
      const [transactionType, setTransactionType] = React.useState(''); // 'save' or 'use'
      const [loading, setLoading] = React.useState(false);
      
      // inputs
      const [nickname, setNickname] = React.useState('');
      const [pin, setPin] = React.useState('');
      
      const [txAmount, setTxAmount] = React.useState('');
      const [txCategory, setTxCategory] = React.useState('');
      const [alertMsg, setAlertMsg] = React.useState('');

      // 아바타 스튜디오 전용 상태 (React Hook Rule 위반 방지)
      const [avatarTemp, setAvatarTemp] = React.useState({});
      const [avatarTab, setAvatarTab] = React.useState('skin');

      // Fetch users from GAS on mount
      React.useEffect(() => {
        fetchUsers();
        
        // 전역 효과음(버튼 클릭 시 숲속의 물방울, 혹은 '뽀용' 소리)
        const handleDocClick = (e) => {
          if (e.target.closest('button') || e.target.closest('.btn-bouncy')) {
             try {
                // 부드러운 팝 사운드 (Free License)
                const a = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
                a.volume = 0.3;
                a.play().catch(() => {});
             } catch(err) {}
          }
        };
        document.addEventListener('click', handleDocClick);
        return () => document.removeEventListener('click', handleDocClick);
      }, []);

      const fetchUsers = async () => {
        setLoading(true);
        try {
          const res = await fetch(SCRIPT_URL + "?action=read");
          const data = await res.json();
          if (Array.isArray(data)) {
            // Parse Avatar JSON from GAS or Fallback to LocalStorage
            const parsedData = data.map(u => {
              let av = { bg: 'none', skin: '#fce2c4', hairColor: '#7a5c43', clothesBase: '#f4a261', hairBack: 'none', eyes: 'normal', nose: 'tiny', mouth: 'smile', blush: 'none', bottoms: 'pants', tops: 'tshirt', hairFront: 'bangs', hat: 'none', handItem: 'none' };
              let unl = ['bg_none', 'bg_room', 'hairBack_none', 'hairBack_long', 'eyes_normal', 'eyes_happy', 'nose_tiny', 'nose_round', 'mouth_smile', 'blush_none', 'bottoms_pants', 'tops_tshirt', 'hairFront_bangs', 'hairFront_center', 'hat_none', 'handItem_none'];
              
              // 1. LocalStorage Fallback Check
              try {
                const local = localStorage.getItem(`avatar_${u.name}`);
                if(local) {
                  const p = JSON.parse(local);
                  if(p.config) av = {...av, ...p.config};
                  if(p.unlocked) unl = [...new Set([...unl, ...p.unlocked])];
                }
              } catch(e) {}
              
              // 2. GAS Sheet Check (If teacher modified the backend to return avatarData)
              if(u.avatarData) {
                try {
                  const p = JSON.parse(u.avatarData);
                  if(p.config) av = {...av, ...p.config};
                  if(p.unlocked) unl = [...new Set([...unl, ...p.unlocked])];
                } catch(e) {}
              }

              return { ...u, avatar: av, unlocked: unl };
            });

            setUsers(parsedData);
            
            if (currentUser) {
              const updated = parsedData.find(u => u.name === currentUser.name);
              if (updated) setCurrentUser(updated);
            }
          }
        } catch (err) {
          console.error("Failed to fetch", err);
          if(users.length === 0) setUsers([{ name: '튤립', balance: 5000, avatar:{hair:'short'}, unlocked:[] }]);
        }
        setLoading(false);
      };

      // Avatar Sync (Saves to LocalStorage & sends to GAS sheet if possible)
      const handleAvatarUpdate = async (newConfig, newUnlocked, cost, logCategory) => {
        const newBalance = currentUser.balance - cost;
        const updatedUser = {
           ...currentUser,
           balance: newBalance,
           avatar: newConfig,
           unlocked: newUnlocked
        };
        setCurrentUser(updatedUser);
        setView('dashboard'); // return to dashboard
        
        const avatarDataStr = JSON.stringify({ config: newConfig, unlocked: newUnlocked });
        
        // Save LocalStorage
        try { localStorage.setItem(`avatar_${currentUser.name}`, avatarDataStr); } catch(e) {}
        
        // Save to GAS
        const payload = {
          name: currentUser.name,
          amount: cost,
          type: '사용',
          category: logCategory,
          avatarData: avatarDataStr
        };
        try {
          await fetch(SCRIPT_URL, {
            method: 'POST', mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          fetchUsers();
        } catch(e) {}
      };

      const handleLogin = (e) => {
        e.preventDefault();
        
        if (nickname === '관리자' && pin === '1234') {
          setView('admin');
          return;
        }

        const found = users.find(u => u.name === nickname);
        if (found) {
          setCurrentUser(found);
          setView('dashboard');
        } else {
          setAlertMsg('닉네임을 찾을 수 없어요 😢');
          setTimeout(() => setAlertMsg(''), 3000);
        }
      };

      const handleTransactionSubmit = async () => {
        if (!txAmount || isNaN(txAmount)) return;
        const amountNum = parseInt(txAmount, 10);
        if (amountNum <= 0) return;

        if (transactionType === 'use' && amountNum > currentUser.balance) {
          setAlertMsg('앗! 잔액이 부족해요 😢');
          setTimeout(() => setAlertMsg(''), 3000);
          return;
        }

        // Apply immediately locally 
        const newBalance = transactionType === 'save' 
          ? currentUser.balance + amountNum 
          : currentUser.balance - amountNum;
          
        const updatedUser = {...currentUser, balance: newBalance};
        setCurrentUser(updatedUser);
        
        // Optimistic UI back to dashboard immediately as requested
        setView('dashboard');
        
        // POST to GAS
        const payload = {
          name: currentUser.name,
          amount: amountNum,
          type: transactionType === 'save' ? '저축' : '사용',
          category: txCategory || '기타',
        };

        try {
          // Standard POST request, using no-cors
          await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          // Background refresh
          fetchUsers();
        } catch (error) {
          console.error('Transaction error', error);
        }
        
        // reset fields
        setTxAmount('');
        setTxCategory('');
      };

      const openTransaction = (type) => {
        setTransactionType(type);
        setTxAmount('');
        setTxCategory('');
        setView('transaction');
      };

      const formatMoney = (amount) => {
        return new Intl.NumberFormat('ko-KR').format(amount) + '원';
      };

      // Inline SVGs (Lucide style)
      const IconUser = () => <svg width="28" height="28" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
      const IconLock = () => <svg width="28" height="28" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
      
      const renderLogin = () => {
        const matchingUser = users.find(u => u.name === nickname);
        
        return (
        <div className="flex flex-col items-center justify-center p-8 h-full bg-gradient-to-b from-blue-50 to-green-50 animate-slide-up relative">
          
          {matchingUser && (
            <div className="absolute top-20 left-1/2 transform -translate-x-1/2 animate-slide-up z-10 flex flex-col items-center">
              <Avatar config={matchingUser.avatar} className="w-40 h-40 animate-float drop-shadow-2xl" />
              <div className="bg-white px-5 py-2 rounded-full text-lg font-bold text-blue-500 shadow-xl text-center mt-2 whitespace-nowrap border-2 border-blue-100">
                오, {nickname}님 나예요! 👋
              </div>
            </div>
          )}

          <div className={`text-7xl mb-6 transition-all duration-500 emoji-fix ${matchingUser ? 'opacity-0 scale-50 h-0 overflow-hidden' : 'animate-float opacity-100 scale-100'}`}>🌱</div>
          <h1 className={`text-4xl font-extrabold text-gray-800 mb-3 tracking-tight transition-all duration-500 ${matchingUser ? 'mt-44' : ''}`}>꿈키움 은행</h1>
          <p className="text-gray-500 mb-12 text-center text-lg leading-relaxed font-medium">나의 소중한 자산을<br/>스스로 관리해요</p>

          <form onSubmit={handleLogin} className="w-full space-y-5">
            <div className="bg-white p-3 rounded-[35px] flex items-center shadow-[0_8px_30px_rgb(0,0,0,0.04)] px-6 min-h-[70px]">
              <span className="text-blue-300 mr-3"><IconUser/></span>
              <input 
                type="text" 
                placeholder="비밀 닉네임 (예: 튤립)"
                className="w-full p-2 outline-none text-xl bg-transparent font-bold text-gray-700 placeholder-gray-300"
                value={nickname}
                onChange={e => setNickname(e.target.value)}
              />
            </div>
            
            { nickname === '관리자' && (
              <div className="bg-white p-3 rounded-[35px] flex items-center shadow-[0_8px_30px_rgb(0,0,0,0.04)] px-6 min-h-[70px] animate-slide-up">
                <span className="text-purple-300 mr-3"><IconLock/></span>
                <input 
                  type="password" 
                  placeholder="비밀번호"
                  className="w-full p-2 outline-none text-xl bg-transparent font-bold text-gray-700 placeholder-gray-300"
                  value={pin}
                  onChange={e => setPin(e.target.value)}
                />
              </div>
            )}

            <button 
              type="submit" 
              className="btn w-full bg-gradient-to-r from-blue-400 to-green-400 text-white font-extrabold text-2xl py-5 rounded-[35px] shadow-[0_10px_25px_rgba(56,189,248,0.3)] mt-6"
              disabled={loading}
            >
              {loading ? '연결 중...' : '시작하기'}
            </button>
          </form>
          
          {alertMsg && (
            <div className="absolute top-12 bg-red-100 text-red-600 px-8 py-4 rounded-full font-bold shadow-xl animate-slide-up text-lg z-50">
              {alertMsg}
            </div>
          )}
        </div>
        );
      };

      const renderDashboard = () => (
        <div className="flex flex-col p-7 h-full bg-[#f8fafc] relative animate-slide-up">
          <div className="flex justify-between items-center mb-6 pt-2">
            <h2 className="text-3xl font-bold text-gray-800 tracking-tight">
              안녕, <span className="text-blue-500">{currentUser?.name}</span>님!
            </h2>
            <button onClick={() => { setCurrentUser(null); setView('login'); }} className="text-base font-bold text-gray-400 bg-white px-5 py-3 rounded-full shadow-sm hover:bg-gray-50 active:scale-95 transition-all">
              로그아웃
            </button>
          </div>

          <div 
            onClick={() => {
              setAvatarTemp(currentUser?.avatar || {});
              setAvatarTab('skin');
              setView('avatar-studio');
            }}
            className="flex items-center space-x-5 mb-8 cursor-pointer active:scale-95 transition-all bg-white rounded-[35px] p-4 shadow-[0_10px_25px_rgba(0,0,0,0.04)] hover:shadow-[0_15px_35px_rgba(99,102,241,0.1)] border-2 border-transparent hover:border-indigo-100"
          >
            <div className="w-20 h-20 bg-gradient-to-br from-indigo-50 to-blue-50 rounded-full flex items-center justify-center flex-shrink-0 shadow-inner overflow-hidden border-4 border-white">
               <Avatar config={currentUser?.avatar} className="w-28 h-28 transform translate-y-3 drop-shadow-md" />
            </div>
            <div className="flex-1 pr-2">
               <p className="text-gray-400 font-extrabold text-sm mb-1 uppercase tracking-widest">Avatar Studio</p>
               <p className="text-indigo-600 font-extrabold flex items-center text-xl">내 아바타 꾸미기 <span className="ml-2 text-2xl emoji-fix">✨</span></p>
            </div>
          </div>

          <div className="bg-gradient-to-br from-[#60a5fa] via-[#818cf8] to-[#c084fc] rounded-[45px] p-9 text-white shadow-[0_20px_40px_rgba(99,102,241,0.25)] mb-8 relative overflow-hidden flex-shrink-0">
            <div className="absolute top-0 right-0 p-8 opacity-20 transform translate-x-4 -translate-y-4">
              <svg width="150" height="150" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            </div>
            <p className="text-blue-100 font-bold mb-3 opacity-90 text-xl">내 통장 잔액</p>
            <h1 className="text-6xl font-extrabold tracking-tight mt-1">
              {formatMoney(currentUser?.balance || 0)}
            </h1>
          </div>

          <div className="flex flex-col gap-5 mt-auto pb-6">
            <button 
              onClick={() => openTransaction('save')}
              className="btn bg-gradient-to-br from-[#dcfce7] to-[#bbf7d0] text-[#166534] p-7 rounded-[40px] flex items-center shadow-sm"
            >
              <div className="w-16 h-16 bg-white rounded-full flex items-center justify-center text-3xl shadow-sm mr-5 emoji-fix">📈</div>
              <div className="text-left">
                <div className="text-2xl font-extrabold mb-1">저축하기</div>
                <div className="text-[#15803d] font-medium">통장에 돈을 넣어요</div>
              </div>
            </button>
            <button 
              onClick={() => openTransaction('use')}
              className="btn bg-gradient-to-br from-[#fce7f3] to-[#fbcfe8] text-[#9d174d] p-7 rounded-[40px] flex items-center shadow-sm"
            >
              <div className="w-16 h-16 bg-white rounded-full flex items-center justify-center text-3xl shadow-sm mr-5 emoji-fix">🛍️</div>
              <div className="text-left">
                <div className="text-2xl font-extrabold mb-1">사용하기</div>
                <div className="text-[#be185d] font-medium">사고 싶은 걸 사요</div>
              </div>
            </button>
          </div>
        </div>
      );

      const renderTransaction = () => {
        const isSave = transactionType === 'save';
        const colorClass = isSave ? 'text-green-600' : 'text-pink-600';
        const bgClass = isSave ? 'bg-[#f0fdf4]' : 'bg-[#fff1f2]';
        const activeCatBg = isSave ? 'bg-green-100 border-green-400' : 'bg-pink-100 border-pink-400';
        
        const categories = isSave ? [
          { icon: '💯', name: '과제 100% 완료', amount: 1000 },
          { icon: '📖', name: '스스로 공부', amount: 1500 },
          { icon: '🎯', name: '주간 목표 달성', amount: 3000 },
          { icon: '💡', name: '심화 문제 해결', amount: 2000 },
          { icon: '🚀', name: '프로젝트 완성', amount: 5000 },
          { icon: '🙋', name: '좋은 질문하기', amount: 1000 },
          { icon: '📓', name: '배움일지 완성', amount: 2000 },
          { icon: '🧹', name: '물품 정돈', amount: 1000 },
          { icon: '🗺️', name: '체험학습 도움', amount: 2500 },
          { icon: '🤝', name: '친구 도와주기', amount: 1000 },
          { icon: '🗣️', name: '바른 말 사용', amount: 1000 },
          { icon: '👏', name: '타인 칭찬하기', amount: 1000 },
          { icon: '👥', name: '프로젝트 협력', amount: 2000 },
          { icon: '🧸', name: '양보하기', amount: 1000 },
          { icon: '🎖️', name: '보너스 1000원', amount: 1000 },
          { icon: '🎖️', name: '보너스 3000원', amount: 3000 },
          { icon: '🎖️', name: '보너스 5000원', amount: 5000 },
          { icon: '👑', name: '보너스 10000원', amount: 10000 }
        ] : [
          { icon: '🍎', name: '간식', amount: 2000 },
          { icon: '🎮', name: '닌텐도 하기', amount: 7000 },
          { icon: '📱', name: '패드 보기', amount: 7000 },
          { icon: '⏱️', name: '10분 자유시간', amount: 3500 },
          { icon: '⏲️', name: '20분 자유시간', amount: 7000 },
          { icon: '⏳', name: '30분 자유시간', amount: 10000 },
          { icon: '🕰️', name: '1시간 자유시간', amount: 20000 }
        ];

        return (
          <div className={`flex flex-col p-7 h-full ${bgClass} animate-slide-up relative`}>
            <div className="pt-4 mb-8 flex items-center flex-shrink-0">
              <button onClick={() => setView('dashboard')} className="p-4 bg-white rounded-full shadow-sm mr-4 active:scale-95 transition-all">
                <svg width="28" height="28" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
              </button>
              <h2 className={`text-3xl font-extrabold ${colorClass} tracking-tight`}>
                얼마를 {isSave ? '저축' : '사용'}할까요?
              </h2>
            </div>
            
            <div className="bg-white rounded-[45px] p-7 shadow-[0_10px_30px_rgba(0,0,0,0.03)] mb-6 flex-1 flex flex-col min-h-0">
              
              <p className="text-gray-500 font-bold mb-4 text-xl flex-shrink-0">{isSave ? '어떻게 모았나요?' : '어디에 쓰나요?'}</p>
              <div className="grid grid-cols-3 sm:grid-cols-4 gap-3 mb-6 overflow-y-auto flex-1 pr-1 content-start">
                {categories.map(cat => (
                  <button 
                    key={cat.name}
                    onClick={() => {
                      setTxCategory(cat.name);
                      if (cat.amount) setTxAmount(cat.amount.toString());
                    }}
                    className={`btn py-3 px-1 rounded-[20px] flex flex-col items-center justify-center border-[3px] transition-all min-h-[90px] ${txCategory === cat.name ? activeCatBg : 'border-transparent bg-gray-50 hover:bg-gray-100'}`}
                  >
                    <span className="text-3xl mb-1 emoji-fix">{cat.icon}</span>
                    <span className="text-xs sm:text-sm font-extrabold text-gray-700 text-center leading-snug break-keep">{cat.name}</span>
                  </button>
                ))}
              </div>

              <p className="text-gray-500 font-bold mb-4 text-xl flex-shrink-0">얼마나요?</p>
              <div className="flex items-center bg-gray-50 p-6 rounded-[30px] text-4xl font-extrabold shadow-inner mb-2 flex-shrink-0">
                <input 
                  type="number"
                  placeholder="0"
                  className="w-full bg-transparent outline-none text-right placeholder-gray-300 mr-3 text-gray-800"
                  value={txAmount}
                  onChange={e => setTxAmount(e.target.value)}
                />
                <span className="text-gray-400">원</span>
              </div>
            </div>

            <button 
              onClick={handleTransactionSubmit}
              disabled={!txAmount || !txCategory}
              className={`btn w-full text-white font-extrabold text-3xl py-6 rounded-[40px] shadow-[0_15px_30px_rgba(0,0,0,0.1)] mb-4 transition-all ${(!txAmount || !txCategory) ? 'opacity-40' : 'opacity-100'} ${isSave ? 'bg-[#4ade80]' : 'bg-[#f472b6]'}`}
            >
              확인
            </button>

            {alertMsg && (
              <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-red-100 text-red-600 px-8 py-5 rounded-full font-bold shadow-2xl animate-slide-up whitespace-nowrap z-50 text-2xl border-2 border-red-200">
                {alertMsg}
              </div>
            )}
          </div>
        );
      };

      const renderAdmin = () => (
        <div className="flex flex-col p-7 h-full bg-[#f8fafc] animate-slide-up">
          <div className="flex justify-between items-center mb-8 pt-4">
            <h2 className="text-3xl font-extrabold text-gray-800 flex items-center">
              <span className="mr-3 text-4xl emoji-fix">👑</span> 전체 현황
            </h2>
            <button onClick={() => setView('login')} className="text-lg bg-white shadow-sm text-gray-600 px-6 py-3 rounded-full font-bold active:scale-95 transition-all">
              나가기
            </button>
          </div>

          <div className="flex justify-between items-center mb-6 px-3">
            <span className="text-gray-500 font-bold text-lg">학생 명단 ({users.length}명)</span>
            <button onClick={fetchUsers} className="text-blue-500 text-lg font-bold flex items-center active:scale-95 transition-all">
              <svg width="20" height="20" className="mr-2" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 1 0 2.13-5.88L2 9"/></svg>
              새로고침
            </button>
          </div>

          <div className="space-y-4 overflow-y-auto flex-1 pb-6 px-1">
            {users.map((u, i) => (
              <div key={i} className="bg-white p-6 rounded-[35px] shadow-[0_5px_15px_rgba(0,0,0,0.03)] flex justify-between items-center flex-row">
                <div className="flex items-center">
                  <div className="w-14 h-14 bg-gradient-to-br from-blue-100 to-indigo-100 rounded-full flex items-center justify-center text-2xl mr-5 text-blue-600 font-extrabold shadow-inner">
                    {u.name.charAt(0)}
                  </div>
                  <span className="text-2xl font-bold text-gray-800">{u.name}</span>
                </div>
                <span className="text-3xl font-extrabold text-[#3b82f6]">
                  {formatMoney(u.balance || 0)}
                </span>
              </div>
            ))}
            {loading && users.length === 0 && (
              <div className="text-center text-gray-400 py-10 text-xl font-bold">불러오는 중...</div>
            )}
            {!loading && users.length === 0 && (
              <div className="text-center text-gray-400 py-10 text-xl font-bold">등록된 학생이 없습니다.</div>
            )}
          </div>
        </div>
      );

      const renderAvatarStudio = () => {
         const handleBuy = (type, item) => {
            const isUnlocked = currentUser.unlocked.includes(`${type}_${item.id}`) || item.price === 0;
            if (isUnlocked) {
               setAvatarTemp({...avatarTemp, [type]: item.id});
            } else {
               if (window.confirm(`[${item.name}] 장식을 ${formatMoney(item.price)}에 구매할까요?`)) {
                  if (currentUser.balance < item.price) {
                     setAlertMsg('앗! 잔액이 부족해요 😢');
                     setTimeout(() => setAlertMsg(''), 3000);
                     return;
                  }
                  const newTemp = {...avatarTemp, [type]: item.id};
                  setAvatarTemp(newTemp);
                  const newUnlocked = [...currentUser.unlocked, `${type}_${item.id}`];
                  handleAvatarUpdate(newTemp, newUnlocked, item.price, `꾸미기 - ${item.name}`);
               }
            }
         };

         const tabs = [
            { id:'bg', icon:'🖼️', name:'배경' },
            { id:'skin', icon:'🎨', name:'피부색' },
            { id:'clothesBase', icon:'🧶', name:'옷색상' },
            { id:'hairFront', icon:'✂️', name:'앞머리' },
            { id:'hairBack', icon:'🎀', name:'뒷머리' },
            { id:'eyes', icon:'👀', name:'눈' },
            { id:'nose', icon:'👃', name:'코' },
            { id:'mouth', icon:'👄', name:'입' },
            { id:'blush', icon:'😊', name:'볼터치' },
            { id:'tops', icon:'👕', name:'상의' },
            { id:'bottoms', icon:'👖', name:'하의' },
            { id:'hat', icon:'👒', name:'모자' },
            { id:'handItem', icon:'🪀', name:'손장식' }
         ];

         return (
            <div className="flex flex-col h-full bg-[#f8fafc] animate-slide-up relative">
               <div className="p-6 pb-4 flex justify-between items-center bg-white rounded-b-[35px] shadow-sm z-10 flex-shrink-0">
                  <h2 className="text-2xl font-extrabold text-indigo-600 tracking-tight">스튜디오 ✨</h2>
                  <button 
                     onClick={() => handleAvatarUpdate(avatarTemp, currentUser.unlocked, 0, '아바타 변경')} 
                     className="bg-gradient-to-r from-indigo-500 to-purple-500 text-white px-6 py-3 rounded-full font-bold shadow-lg active:scale-95 transition-all text-sm"
                  >
                     저장/나가기
                  </button>
               </div>
               
               <div className="flex-1 flex flex-col items-center justify-center py-6 px-4 flex-shrink-0 min-h-[280px]">
                  <div className="w-56 h-56 bg-white rounded-full shadow-[0_20px_40px_rgba(0,0,0,0.06)] flex items-center justify-center border-4 border-indigo-50 relative animate-float overflow-hidden">
                     <Avatar config={avatarTemp} className="w-full h-full transform translate-y-6 drop-shadow-xl" />
                  </div>
                  <div className="mt-6 bg-indigo-100 text-indigo-700 px-8 py-3 rounded-full font-extrabold shadow-sm flex items-center text-lg">
                     <span className="mr-2 emoji-fix">💰</span> 보유 금액: {formatMoney(currentUser?.balance)}
                  </div>
               </div>

               <div className="bg-white p-6 rounded-t-[45px] shadow-[0_-10px_30px_rgba(0,0,0,0.04)] h-5/12 sm:h-1/2 flex flex-col flex-shrink-0">
                  {/* Tabs */}
                  <div className="flex overflow-x-auto space-x-2 pb-4 mb-2 styled-scroll flex-shrink-0">
                     {tabs.map(t => (
                        <button key={t.id} onClick={()=>setAvatarTab(t.id)} className={`px-4 py-3 rounded-3xl font-bold flex flex-col items-center justify-center flex-shrink-0 transition-all ${avatarTab===t.id ? 'bg-indigo-500 text-white shadow-md' : 'bg-gray-50 text-gray-400 hover:bg-gray-100'}`}>
                           <span className="text-2xl mb-1 emoji-fix">{t.icon}</span>
                           <span className="text-xs">{t.name}</span>
                        </button>
                     ))}
                  </div>
                  
                  {/* Items Display */}
                  <div className="flex-1 overflow-y-auto pb-4 pt-1 px-1 styled-scroll content-start">
                     {['skin', 'clothesBase'].includes(avatarTab) && (
                        <div className="flex flex-wrap gap-4 justify-center">
                           {AVATAR_COLORS[avatarTab].map(col => (
                              <button key={col} onClick={()=>setAvatarTemp({...avatarTemp, [avatarTab]: col})} className="w-16 h-16 rounded-full shadow-md border-4 transition-all focus:scale-110 active:scale-95 btn-bouncy" style={{backgroundColor: col, borderColor: avatarTemp[avatarTab]===col ? '#6366f1' : 'transparent'}} />
                           ))}
                        </div>
                     )}
                     
                     {['bg', 'hairBack', 'eyes', 'nose', 'mouth', 'blush', 'bottoms', 'tops', 'hairFront', 'hat', 'handItem'].includes(avatarTab) && (
                        <div className="flex flex-col gap-4">
                           {['hairFront', 'hairBack'].includes(avatarTab) && (
                              <div className="flex overflow-x-auto gap-3 pb-3 pt-1 styled-scroll">
                                 {AVATAR_COLORS.hairColor.map(col => (
                                    <button key={col} onClick={()=>setAvatarTemp({...avatarTemp, hairColor: col})} className="w-12 h-12 flex-shrink-0 rounded-full shadow-sm border-4 transition-all btn-bouncy" style={{backgroundColor: col, borderColor: avatarTemp.hairColor===col ? '#6366f1' : 'transparent'}} />
                                 ))}
                              </div>
                           )}
                           <div className="grid grid-cols-2 gap-3 sm:grid-cols-3">
                              {AVATAR_CATALOG[avatarTab].map(item => {
                                 const isUnl = currentUser.unlocked.includes(`${avatarTab}_${item.id}`) || item.price === 0;
                                 const isEq = avatarTemp[avatarTab] === item.id;
                                 return (
                                    <button key={item.id} onClick={()=>handleBuy(avatarTab, item)} className={`relative flex flex-col items-center justify-center p-5 rounded-3xl border-4 transition-all btn-bouncy ${isEq ? 'border-indigo-400 bg-[#eff6ff]' : 'border-gray-50 bg-white hover:bg-gray-50'}`}>
                                       <span className="text-lg font-extrabold text-gray-700 mb-3">{item.name}</span>
                                       {!isUnl && <span className="text-sm bg-pink-100 text-pink-600 px-4 py-1.5 rounded-full font-bold">{item.price/1000}k 원</span>}
                                       {isUnl && <span className={`text-xs px-4 py-1.5 rounded-full font-bold ${isEq ? 'bg-indigo-500 text-white' : 'bg-green-100 text-green-700'}`}>{isEq ? '착용 중' : '보유'}</span>}
                                    </button>
                                 )
                              })}
                           </div>
                        </div>
                     )}
                  </div>
               </div>

               {alertMsg && (
                 <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-red-100 text-red-600 px-8 py-4 rounded-full font-bold shadow-2xl animate-slide-up whitespace-nowrap z-50 text-xl border-2 border-red-200">
                   {alertMsg}
                 </div>
               )}
            </div>
         );
      };

      return (
        <div className="app-container">
          {view === 'login' && renderLogin()}
          {view === 'dashboard' && renderDashboard()}
          {view === 'transaction' && renderTransaction()}
          {view === 'admin' && renderAdmin()}
          {view === 'avatar-studio' && renderAvatarStudio()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
